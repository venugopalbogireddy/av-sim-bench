scenario: golden

city:
  rows: 5
  cols: 5
  # Traffic lights: start corner, center intersection (staggered phase), goal corner
  traffic_light_nodes:
    - [0, 0]
    - [2, 2]   # mid-path intersection — phase_offset=(2*5+2*3)%50=16 → RED when agents arrive ~tick 14
    - [4, 4]
  # Stop signs: on the diagonal path agents take from (0,0) to (4,4)
  stop_sign_nodes:
    - [1, 1]
    - [3, 3]
  blocked_edges: []
  one_way_edges: []

max_ticks: 300

agents:
  - agent_id: agent_00
    start: [0, 0]
    goal: [4, 4]
    ignore_red_lights: false
    roll_stop_signs: false
    speed_noise_std: 0.05

  - agent_id: agent_01
    start: [0, 0]
    goal: [4, 4]
    ignore_red_lights: false
    roll_stop_signs: false
    speed_noise_std: 0.05

  - agent_id: agent_02
    start: [0, 0]
    goal: [4, 4]
    ignore_red_lights: false
    roll_stop_signs: false
    speed_noise_std: 0.15

  - agent_id: agent_03
    start: [0, 0]
    goal: [4, 4]
    ignore_red_lights: false
    roll_stop_signs: false
    speed_noise_std: 0.30
